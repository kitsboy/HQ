<script>
  /* Kill stale service workers + caches so version strings cannot mix across deploys */
  (function () {
    var META = document.querySelector('meta[name="hq-version"]');
    var WANT = META && META.content;
    var KEY = "hq_deployed_version";
    try {
      var had = localStorage.getItem(KEY);
      if (WANT && had && had !== WANT && "serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          return Promise.all(regs.map(function (r) { return r.unregister(); }));
        }).then(function () {
          return caches.keys();
        }).then(function (keys) {
          return Promise.all(keys.map(function (k) { return caches.delete(k); }));
        }).then(function () {
          localStorage.setItem(KEY, WANT);
          if (!sessionStorage.getItem("hq_ver_reloaded")) {
            sessionStorage.setItem("hq_ver_reloaded", "1");
            location.reload(true);
          }
        }).catch(function () {});
      } else if (WANT) {
        localStorage.setItem(KEY, WANT);
      }
    } catch (e) {}
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js?v=3.19.0").catch(function () {});
    }
  })();
</script>
