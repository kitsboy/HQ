name: Status pinger

# HTTP uptime → status.json (no secrets in the pinger itself).
# Commits status.json; optionally deploys matrix to CF Pages when secrets exist.
#
# Required GitHub Actions secrets (repo Settings → Secrets and variables → Actions)
# for the optional Cloudflare deploy step only — pinger+commit work without them:
#   CLOUDFLARE_API_TOKEN   — Pages deploy token (same as deploy.yml)
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account id (same as deploy.yml)
# Do not put secret *values* in this file.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "projects.json"
      - "scripts/status-ping.mjs"
      - ".github/workflows/status-pinger.yml"

concurrency:
  group: status-pinger
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ping suite + satohash metrics
        run: node scripts/status-ping.mjs

      - name: Commit status.json if changed
        id: commit
        run: |
          git config user.name "hq-status-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No status change"
          else
            git commit -m "chore: refresh status.json [skip deploy]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Pushed status.json"
          fi

      # secrets.* cannot appear in step `if:` (GH: Unrecognized named-value: secrets).
      # Gate deploy with step output + empty-env check inside the script instead.
      - name: Deploy status matrix to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Skipping CF deploy: set GitHub Actions secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID"
            exit 0
          fi
          # Full build so we never overwrite Pages with a partial/stale public/ tree.
          npm run build
          cp status.json public/status.json
          npx --yes wrangler@4 pages deploy ./public --project-name=giveabit-hq --branch=main
