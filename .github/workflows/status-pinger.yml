name: Status pinger

# True HTTP uptime for HQ (writes status.json — no secrets).
# HQ loads /status.json or raw GitHub after this runs.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "projects.json"
      - "scripts/status-ping.mjs"
      - ".github/workflows/status-pinger.yml"

concurrency:
  group: status-pinger
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ping suite URLs
        run: node scripts/status-ping.mjs

      - name: Commit status.json
        run: |
          git config user.name "hq-status-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status.json
          if git diff --staged --quiet; then
            echo "No status change"
          else
            git commit -m "chore: refresh status.json [skip deploy]"
            git push
          fi

      - name: Deploy status.json to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p public
          # Prefer full site assembly if sources present
          if [ -f control-panel.html ]; then
            cp control-panel.html public/index.html
            cp projects.json agents.json tools.json status.example.json manifest.webmanifest public/ 2>/dev/null || true
            cp pages/_headers pages/_redirects public/ 2>/dev/null || true
          fi
          cp status.json public/status.json
          npx --yes wrangler@4 pages deploy ./public --project-name=giveabit-hq --branch=main
