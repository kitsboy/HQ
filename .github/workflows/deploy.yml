name: Deploy HQ to Cloudflare Pages

on:
  push:
    branches: [main]
    paths-ignore:
      # status-pinger deploys status.json itself when CF secrets exist
      - "status.json"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build public site (full npm build)
        run: |
          # Single build path — never hand-copy a partial subset (missed docs/projects before)
          npm run build
          echo "=== public tree (docs) ==="
          find public/docs -type f | sort | head -80
          test -f public/docs/projects/giveabit.md || (echo "MISSING project pack giveabit.md" && exit 1)
          test -f public/hq.js || (echo "MISSING hq.js" && exit 1)
          test -f public/index.html || (echo "MISSING index.html" && exit 1)
          ls -la public | head -40

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN not set."
            exit 1
          fi
          npx --yes wrangler@4 pages deploy ./public --project-name=giveabit-hq --branch=main
