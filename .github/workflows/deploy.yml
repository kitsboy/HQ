name: Deploy HQ to Cloudflare Pages

on:
  push:
    branches: [main]
    paths-ignore:
      # status-pinger deploys status.json itself when CF secrets exist
      - "status.json"
      - "docs/**"
      - "**.md"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Assemble public site
        run: |
          mkdir -p public
          mkdir -p public/metrics public/schemas public/docs public/handoff
          cp control-panel.html public/index.html
          cp projects.json agents.json tools.json status.example.json manifest.webmanifest public/
          cp pages/_headers pages/_redirects public/
          cp -R metrics/. public/metrics/
          cp -R schemas/. public/schemas/
          cp docs/*.md public/docs/ || true
          cp handoff/state.json public/handoff/ || true
          if [ -f status.json ]; then cp status.json public/; fi
          ls -la public && ls public/metrics | head


      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN not set."
            exit 1
          fi
          npx --yes wrangler@4 pages deploy ./public --project-name=giveabit-hq --branch=main
