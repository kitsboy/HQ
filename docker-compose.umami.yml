services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    restart: unless-stopped
    ports:
      - "0.0.0.0:3002:3000"
    environment:
      DATABASE_URL: postgresql://umami:***@172.18.0.2:5432/umami
      DATABASE_TYPE: postgresql
      HASH_SALT: umami_giveabit_2026_salt
      ALLOWED_ORIGINS: https://hq.giveabit.io
      DISABLE_CORS: "1"
    networks:
      - lnbits_lnbits_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  lnbits_lnbits_net:
    external: true
